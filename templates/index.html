<!DOCTYPE html>
<html>
<head>
  <title>AI Study Assistant</title>
  <script src="{{ url_for('static',filename='script.js')}}" defer> </script>
  <style>
    /* Vibrant Sunrise Background */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 30px;
      background: linear-gradient(to bottom right, #fff1f2, #ffe4e6); 
      color: #312e81; 
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
    }
    
    h1 {
      color: #1e1b4b; 
      text-align: center;
      margin-bottom: 30px;
    }

    /* Soft Pink Input Area */
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 15px;
      padding: 15px;
      border: 2px solid #fecdd3;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      transition: border-color 0.3s, box-shadow 0.3s;
      resize: vertical;
      background-color: rgba(255, 255, 255, 0.8);
    }

    /* Vibrant Coral Glow on Focus */
    textarea:focus {
      outline: none;
      border-color: #fb7185;
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2);
    }

    input[type="file"] {
      margin-bottom: 20px;
      display: block;
      font-family: inherit;
      color: #4c1d95;
    }

    /* Bold Coral Buttons */
    button {
      padding: 12px 20px;
      margin: 5px 10px 20px 0;
      cursor: pointer;
      background-color: #e11d48; 
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(225, 29, 72, 0.2);
    }

    button:hover {
      background-color: #be123c;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    /* Bright Output Box */
    .output {
      margin-top: 20px;
      padding: 25px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.1);
      border-left: 6px solid #e11d48;
      line-height: 1.6;
      font-size: 16px;
    }

    /* Flashcard Grid */
    .flashcard-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .flashcard {
      background-color: transparent;
      width: 280px;
      height: 180px;
      perspective: 1000px;
      cursor: pointer;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .flashcard-front, .flashcard-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      font-size: 18px;
      line-height: 1.4;
    }

    /* Front: Clean White */
    .flashcard-front {
      background-color: #ffffff;
      color: #312e81;
      border: 1px solid #ffe4e6;
    }

    /* Back: Deep Indigo/Purple */
    .flashcard-back {
      background-color: #4f46e5; 
      color: white;
      transform: rotateY(180deg);
      border: 1px solid #3730a3;
    }
  </style>
</head>

<body>

  <h1>📘 AI Study Assistant</h1>

  <!-- Input -->
  <textarea id="notes" placeholder="Paste your notes here..."></textarea>
  <input type="file" id="fileUpload" accept=".txt,.pdf" style="margin-bottom: 10px; display: block;" />

  <button onclick="generateSummary()">Summary</button>
  <button onclick="generateQuiz()">Quiz</button>
  <button onclick="generateFlashcards()">Flashcards</button>

  <!-- Output -->
  <div class="output" id="output">
    Output will appear here...
  </div>

</body>
</html>
